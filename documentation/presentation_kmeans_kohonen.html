<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>K-means &amp; Kohonen — Présentation</title>
<style>
  :root{
    --bg:#0e1116; --bg2:#151a22; --card:#ffffff;
    --fg:#eef2f7; --muted:#9aa7b8; --line:#252c37;
    --accent:#5eb0ff; --accent2:#7ee0c0; --warn:#ffcf6b;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;overflow:hidden}
  .deck{height:100vh;width:100vw;position:relative}
  .slide{position:absolute;inset:0;display:none;flex-direction:column;padding:2.8vh 3.4vw 3.4vh}
  .slide.active{display:flex}

  .kicker{font-size:1vw;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:.4vh}
  .slide h2{font-size:2.1vw;line-height:1.08;font-weight:800;letter-spacing:-.01em}
  .slide h2 .dim{color:var(--muted);font-weight:600}
  .params{margin-top:.7vh;display:flex;gap:.55vw;flex-wrap:wrap;align-items:center}
  .tag{display:inline-block;background:var(--bg2);border:1px solid var(--line);color:var(--fg);font-weight:600;font-size:.95vw;padding:.3vh .75vw;border-radius:999px}
  .tag.k{color:var(--accent2);border-color:rgba(126,224,192,.35)}
  .tag.mse{color:var(--warn);border-color:rgba(255,207,107,.35)}
  .tag.page{color:var(--accent);border-color:rgba(94,176,255,.4)}

  /* gallery — vertical stack, always fits (max-height + max-width) */
  .gallery{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;
           gap:1.2vh;align-items:center;justify-content:center;margin-top:1.6vh}
  .figure{background:var(--card);border-radius:var(--radius);padding:.6vh .6vw .2vh;display:flex;flex-direction:column;gap:.3vh;
          box-shadow:0 12px 30px rgba(0,0,0,.4);max-width:100%;cursor:zoom-in;transition:transform .12s ease}
  .figure:hover{transform:translateY(-2px)}
  .figure img{object-fit:contain;border-radius:6px;display:block;margin:0 auto}
  .figure figcaption{color:#48525f;font-size:.82vw;font-weight:600;text-align:center;padding-bottom:.2vh}

  /* title / section / concept / conclusion */
  .title{justify-content:center;align-items:flex-start;
    background:radial-gradient(1200px 600px at 15% -10%, rgba(94,176,255,.14), transparent 60%),
               radial-gradient(1000px 500px at 100% 120%, rgba(126,224,192,.12), transparent 55%);}
  .title .big{font-size:4.6vw;font-weight:850;line-height:1.03;letter-spacing:-.02em;max-width:82vw}
  .title .big em{font-style:normal;color:var(--accent)}
  .title .lead{color:var(--muted);font-size:1.6vw;margin-top:2.2vh;max-width:62vw}
  .title .meta{margin-top:4vh;color:var(--muted);font-size:1.1vw;display:flex;gap:1vw;flex-wrap:wrap}

  .section{justify-content:center;background:radial-gradient(900px 500px at 12% 10%, rgba(94,176,255,.10), transparent 60%);}
  .section .num{font-size:9vw;font-weight:850;color:var(--bg2);-webkit-text-stroke:2px var(--accent);line-height:.9;letter-spacing:-.03em}
  .section h2{font-size:3.2vw;margin-top:1vh}
  .section p{color:var(--muted);font-size:1.3vw;margin-top:1.2vh;max-width:60vw}
  .section .count{margin-top:2vh;color:var(--accent2);font-weight:700;font-size:1.15vw}

  table.nat{width:100%;border-collapse:collapse;margin-top:2.4vh;font-size:1.1vw}
  table.nat th,table.nat td{border:1px solid var(--line);padding:1.2vh 1vw;text-align:left;vertical-align:top}
  table.nat thead th{background:var(--bg2);color:var(--accent);font-size:.92vw;letter-spacing:.05em;text-transform:uppercase}
  table.nat td{color:var(--muted)} table.nat td b{color:var(--fg)}
  table.nat tr td:first-child{color:var(--fg);font-weight:700;width:14%}
  .same{color:var(--accent2);font-weight:700}
  .caption{margin-top:1.6vh;color:var(--muted);font-size:1.12vw;line-height:1.4;max-width:70vw}
  .caption b{color:var(--fg)}

  .concl ul{margin-top:2vh;list-style:none;display:flex;flex-direction:column;gap:1.3vh;max-width:82vw}
  .concl li{font-size:1.28vw;line-height:1.4;padding-left:2.2vw;position:relative;color:var(--muted)}
  .concl li::before{content:"";position:absolute;left:0;top:.5vh;width:1vw;height:1vw;border-radius:4px;background:var(--accent)}
  .concl li b{color:var(--fg)} .concl li.warn::before{background:var(--warn)}

  /* PCA figure slides — image en grand, en-tête et légende compacts */
  .pcafig{padding-top:1.8vh;padding-bottom:2vh}
  .pcafig h2{font-size:1.8vw}
  .pcafig .gallery{margin-top:.8vh}
  .pcafig .figure{padding:.35vh .35vw}
  .pcafig .caption{margin-top:.9vh;font-size:1.02vw;line-height:1.35;max-width:92vw}

  /* report text slides */
  .report{justify-content:flex-start}
  .report .body{margin-top:1.8vh;display:flex;flex-direction:column;gap:1.3vh;max-width:84vw;overflow-y:auto;padding-right:1vw}
  .report .body p{font-size:1.22vw;line-height:1.5;color:#c7d1de;text-align:justify}
  .report .body p::first-letter{font-weight:700;color:var(--fg)}

  .progress{position:fixed;top:0;left:0;height:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:width .25s ease;z-index:20}
  .counter{position:fixed;bottom:1.4vh;right:2vw;color:var(--muted);font-size:.92vw;font-variant-numeric:tabular-nums;z-index:20}
  .hint{position:fixed;bottom:1.4vh;left:2vw;color:#3a434f;font-size:.82vw;z-index:20}
  .navzone{position:fixed;top:0;bottom:0;width:12vw;z-index:5;cursor:pointer}
  .navzone.left{left:0} .navzone.right{right:0}

  #lb{position:fixed;inset:0;background:rgba(6,9,13,.94);display:none;z-index:40;cursor:zoom-out;padding:3vh 3vw}
  #lb.open{display:flex;align-items:center;justify-content:center}
  #lb img{max-width:100%;max-height:100%;object-fit:contain;background:#fff;border-radius:10px;padding:1vh 1vw;box-shadow:0 20px 60px rgba(0,0,0,.6)}
  #lb .lbhint{position:fixed;top:2.4vh;right:2.6vw;color:var(--muted);font-size:1vw}

  @media print{
    body{overflow:visible;background:#fff}
    .slide{position:relative;display:flex!important;min-height:100vh;page-break-after:always;border-bottom:1px solid #ddd}
    .progress,.counter,.hint,.navzone,#lb{display:none}
    .kicker{color:#0a66c2}.slide h2,.title .big,.section h2{color:#0b0f14}
    .caption,.section p,.title .lead,.concl li,.tag{color:#333}
    .figure{box-shadow:none;border:1px solid #ddd}
  }
</style>
</head>

<script>
const BASE="Rapport%20Unsupervised%20Deep%20Learning/";
const src=n=>BASE+(n===0?"image.png":"image%20"+n+".png");
const range=(a,b)=>{const o=[];for(let i=a;i<=b;i++)o.push(i);return o;};
const ROLE7=["Métadonnées","Courbe d'entraînement","Reconstructions — train","Reconstructions — test","Distribution des classes — train","Distribution des classes — test","Dictionnaire / Carte"];
const ROLE5=["Métadonnées","Courbe d'entraînement","Reconstructions — train","Reconstructions — test","Dictionnaire"];
const PER=2;

// one test -> several slides (chunks of PER figures)
function testChunks(t){
  const roles = t.imgs.length===7?ROLE7 : t.imgs.length===5?ROLE5 : null;
  const chunks=[]; for(let s=0;s<t.imgs.length;s+=PER) chunks.push(t.imgs.slice(s,s+PER));
  const total=chunks.length;
  return chunks.map((chunk,ci)=>{
    const figs=chunk.map((idx,j)=>{
      const gi=ci*PER+j;
      const cap=roles?`<figcaption>${roles[gi]}</figcaption>`:"";
      const ih=chunk.length===1?'74vh':'36vh';
      return `<figure class="figure" onclick="openLb('${src(idx)}')"><img loading="lazy" style="max-height:${ih};max-width:86vw" src="${src(idx)}" alt="">${cap}</figure>`;
    }).join('');
    const pill = total>1?`<span class="tag page">${ci+1}/${total}</span>`:'';
    const tags = t.tags.map(x=>`<span class="tag ${x.c||''}">${x.t}</span>`).join('')+pill;
    return `<section class="slide">
      <div class="kicker">${t.kicker}</div>
      <h2>Test ${t.n} — <span class="dim">${t.title}</span></h2>
      <div class="params">${tags}</div>
      <div class="gallery">${figs}</div>
    </section>`;
  });
}
const sectionSlide=(num,title,desc,count)=>`<section class="slide section">
  <div class="num">${num}</div><h2>${title}</h2><p>${desc}</p><div class="count">${count}</div></section>`;

// conclusion text of a section (verbatim from the report), 2 paragraphs / slide
function conclSlides(sec,paras){
  const per=2,chunks=[];
  for(let s=0;s<paras.length;s+=per) chunks.push(paras.slice(s,s+per));
  const total=chunks.length;
  return chunks.map((ch,ci)=>{
    const pill=total>1?`<span class="tag page">${ci+1}/${total}</span>`:'';
    return `<section class="slide report">
      <div class="kicker">Conclusion du rapport</div>
      <h2>${sec}</h2>
      <div class="params">${pill}</div>
      <div class="body">${ch.map(p=>`<p>${p}</p>`).join('')}</div>
    </section>`;
  });
}

// conclusions verbatim from the report, keyed by section number
const CONCL={

  `On peut conclure sur kmeans avec l'algorithme de Lloyd que à partir de k = 100 le flou est assez bas pour reconnaitre l'image et à partir de K = 300 on réduit assez le floue pour être presque net. Si on met un k = 1000 ou k = 500 les images sont de bonne qualité avec une répartition par cluster de presque 1 classe par cluster avec peu de diversité dans les clusters.`,

  `Avec une grille de 10x10, on commence par avoir de meilleurs résultat, les éléments se regroupe bien dans la carte de kohonen et les images sont plus reconnaissable avec un de réprésentant pour les différents cas du dataset. On a toujours des images floues et des formes pas claire. On voit bien dans les histogrammes, moins de diversité par classe que pour les petites grilles.`,
  `Pour une grille de 20x20, on commence à bien reconnaitre les résultats, pour obtenir les résultats on a passé le gamma à 0.5 on remarque qu'un gamma plus petit permet d'avoir de meilleurs résultat. Une grille de 20x20 permet d'avoir de meilleurs résultats.`,

};

const slides=[];

slides.push(`<section class="slide title">
  <div class="big">Compresser une image<br>par <em>quantification</em></div>
  <div class="lead">K-means &amp; Kohonen — deux dictionnaires appris, un même codec.<br>Tous nos cas d'expérimentation sur MNIST et QuickDraw.</div>
  <div class="meta"><span>Deep Learning non supervisé</span><span>·</span><span>26 tests</span></div>
</section>`);

slides.push(`<section class="slide">
  <div class="kicker">Le principe</div>
  <h2>Encoder une image = <span class="dim">l'indice de son prototype</span></h2>
  <table class="nat">
    <thead><tr><th>Algo</th><th>Espace latent</th><th>CodeBook</th><th>CodeByte / image</th><th>Compression</th></tr></thead>
    <tbody>
      <tr><td>K-means<br>(k=300)</td><td><b>Entier discret</b> : indice du cluster ∈ {0…k−1}</td><td>les <b>k centroïdes</b> (k × 784 flottants)</td><td>⌈log₂300⌉ = <b>9 bits</b></td><td><b>697:1</b></td></tr>
      <tr><td>Kohonen<br>(k=300)</td><td><b>Entier discret</b> : indice du neurone gagnant (BMU)</td><td>les <b>k feature vectors</b></td><td><span class="same">9 bits — identique</span></td><td><span class="same">≈ 697:1</span></td></tr>
    </tbody>
  </table>
  <div class="caption">Même codec, même compression. Toute la différence est dans <b>comment le dictionnaire s'organise</b> — c'est ce que montrent les tests qui suivent.</div>
</section>`);

const lb=document.getElementById('lb'), lbimg=document.getElementById('lbimg');
function show(n){i=Math.max(0,Math.min(els.length-1,n));
  els.forEach((s,k)=>s.classList.toggle('active',k===i));
  counter.textContent=(i+1)+" / "+els.length;
  progress.style.width=(i/(els.length-1)*100)+"%";}
function go(d){ if(lb.classList.contains('open'))return; show(i+d); }
function openLb(s){ lbimg.src=s; lb.classList.add('open'); }
function closeLb(){ lb.classList.remove('open'); lbimg.src=""; }
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeLb(); return; }
  if(lb.classList.contains('open'))return;
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){ go(1); e.preventDefault(); }
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){ go(-1); e.preventDefault(); }
  else if(e.key==='Home'){ show(0); } else if(e.key==='End'){ show(els.length-1); }
  else if(e.key==='f'||e.key==='F'){ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
});
